<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#161616"/>

  <!-- Client -->
  <rect x="30" y="110" width="100" height="56" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="80" y="135" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Client</text>
  <text x="80" y="153" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">POST /ask</text>

  <!-- arrow in -->
  <line x1="130" y1="138" x2="178" y2="138" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="174,133 184,138 174,143" fill="#2a2a2a"/>

  <!-- Worker -->
  <rect x="188" y="97" width="148" height="82" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="262" y="118" text-anchor="middle" fill="#999" font-family="monospace" font-size="11">Worker</text>
  <text x="262" y="135" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">auth + rate limit</text>
  <text x="262" y="151" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">call OpenAI</text>
  <text x="262" y="167" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">persist to D1</text>

  <!-- main path: response back to client -->
  <line x1="336" y1="120" x2="500" y2="120" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="496,115 506,120 496,125" fill="#2a2a2a"/>
  <text x="420" y="110" text-anchor="middle" fill="#3a3a3a" font-family="monospace" font-size="9">response</text>

  <!-- Response box -->
  <rect x="510" y="97" width="130" height="56" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="575" y="122" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Client</text>
  <text x="575" y="140" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">receives answer</text>

  <!-- fork: async telemetry path (goes down then right) -->
  <line x1="262" y1="179" x2="262" y2="220" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="262" y1="220" x2="510" y2="220" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="506,215 516,220 506,225" fill="#2a2a2a"/>
  <text x="388" y="212" text-anchor="middle" fill="#3a3a3a" font-family="monospace" font-size="9">async — does not block response</text>

  <!-- Analytics Engine -->
  <rect x="520" y="196" width="190" height="48" rx="8" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
  <text x="615" y="218" text-anchor="middle" fill="#777" font-family="monospace" font-size="11">Analytics Engine</text>
  <text x="615" y="235" text-anchor="middle" fill="#454545" font-family="monospace" font-size="10">latency · tokens · metadata</text>

  <!-- waitUntil label -->
  <text x="188" y="255" fill="#3a3a3a" font-family="monospace" font-size="9">ctx.waitUntil() — telemetry write completes after response is sent</text>

  <text x="400" y="280" text-anchor="middle" fill="#2e2e2e" font-family="monospace" font-size="10">user gets their answer without waiting for observability writes</text>
</svg>
