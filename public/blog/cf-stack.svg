<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#161616"/>

  <!-- boundary box: "same network" -->
  <rect x="200" y="40" width="400" height="200" rx="12" fill="none" stroke="#222" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="400" y="34" text-anchor="middle" fill="#383838" font-family="monospace" font-size="10" letter-spacing="1">same network boundary</text>

  <!-- Worker -->
  <rect x="230" y="64" width="340" height="52" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="400" y="86" text-anchor="middle" fill="#999" font-family="monospace" font-size="12">Cloudflare Workers</text>
  <text x="400" y="104" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">compute · stateless · no cold starts</text>

  <!-- arrow down -->
  <line x1="330" y1="116" x2="330" y2="142" stroke="#2a2a2a" stroke-width="1"/>
  <polygon points="326,138 330,148 334,138" fill="#2a2a2a"/>
  <line x1="470" y1="116" x2="470" y2="142" stroke="#2a2a2a" stroke-width="1"/>
  <polygon points="466,138 470,148 474,138" fill="#2a2a2a"/>

  <!-- D1 -->
  <rect x="230" y="148" width="150" height="48" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="305" y="170" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">D1</text>
  <text x="305" y="187" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">persistence · SQLite</text>

  <!-- Analytics Engine -->
  <rect x="420" y="148" width="150" height="48" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="495" y="170" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Analytics Engine</text>
  <text x="495" y="187" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">telemetry · events</text>

  <!-- OpenAI — outside the boundary -->
  <rect x="630" y="148" width="130" height="48" rx="8" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
  <text x="695" y="170" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">OpenAI</text>
  <text x="695" y="187" text-anchor="middle" fill="#404040" font-family="monospace" font-size="10">gpt-4o-mini</text>

  <!-- arrow worker → OpenAI -->
  <line x1="570" y1="172" x2="628" y2="172" stroke="#252525" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="624,168 634,172 624,176" fill="#252525"/>

  <!-- Client — outside left -->
  <rect x="40" y="148" width="110" height="48" rx="8" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
  <text x="95" y="170" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">Client</text>
  <text x="95" y="187" text-anchor="middle" fill="#404040" font-family="monospace" font-size="10">HTTP</text>

  <!-- arrow client → worker -->
  <line x1="150" y1="172" x2="228" y2="172" stroke="#252525" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="224,168 234,172 224,176" fill="#252525"/>

  <!-- bottom label -->
  <text x="400" y="275" text-anchor="middle" fill="#2e2e2e" font-family="monospace" font-size="10">compute and storage colocated — one network, no cross-service hops</text>
</svg>
