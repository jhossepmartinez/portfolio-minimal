<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#161616"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#666" font-family="monospace" font-size="13" letter-spacing="2">ARCHITECTURE</text>

  <!-- ── Client ── -->
  <rect x="60" y="240" width="140" height="60" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="130" y="265" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Client</text>
  <text x="130" y="283" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">HTTPS</text>

  <!-- arrow client → worker -->
  <line x1="200" y1="270" x2="278" y2="270" stroke="#2e2e2e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="278,265 288,270 278,275" fill="#2e2e2e"/>

  <!-- ── Cloudflare Worker ── (center, tall) -->
  <rect x="288" y="160" width="240" height="220" rx="12" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="408" y="190" text-anchor="middle" fill="#999" font-family="monospace" font-size="12" letter-spacing="1">WORKER</text>
  <!-- inner labels -->
  <rect x="308" y="204" width="200" height="22" rx="4" fill="#222" stroke="#2a2a2a" stroke-width="1"/>
  <text x="408" y="219" text-anchor="middle" fill="#606060" font-family="monospace" font-size="10">OAuth / JWT auth</text>
  <rect x="308" y="234" width="200" height="22" rx="4" fill="#222" stroke="#2a2a2a" stroke-width="1"/>
  <text x="408" y="249" text-anchor="middle" fill="#606060" font-family="monospace" font-size="10">Rate limiting</text>
  <rect x="308" y="264" width="200" height="22" rx="4" fill="#222" stroke="#2a2a2a" stroke-width="1"/>
  <text x="408" y="279" text-anchor="middle" fill="#606060" font-family="monospace" font-size="10">Request routing</text>
  <rect x="308" y="294" width="200" height="22" rx="4" fill="#222" stroke="#2a2a2a" stroke-width="1"/>
  <text x="408" y="309" text-anchor="middle" fill="#606060" font-family="monospace" font-size="10">Async telemetry</text>
  <rect x="308" y="324" width="200" height="22" rx="4" fill="#222" stroke="#2a2a2a" stroke-width="1"/>
  <text x="408" y="339" text-anchor="middle" fill="#606060" font-family="monospace" font-size="10">Error logging</text>

  <!-- ── D1 Database ── -->
  <rect x="620" y="130" width="180" height="80" rx="10" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <!-- cylinder top ellipse -->
  <ellipse cx="710" cy="158" rx="60" ry="14" fill="#222" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="650" y1="158" x2="650" y2="192" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="770" y1="158" x2="770" y2="192" stroke="#2a2a2a" stroke-width="1"/>
  <ellipse cx="710" cy="192" rx="60" ry="14" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="710" y="220" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">D1</text>
  <text x="710" y="236" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">SQLite · audit trail</text>

  <!-- arrow worker → D1 -->
  <line x1="528" y1="230" x2="618" y2="210" stroke="#2e2e2e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="614,206 624,208 618,217" fill="#2e2e2e"/>

  <!-- ── OpenAI ── -->
  <rect x="620" y="280" width="180" height="70" rx="10" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="710" y="308" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">OpenAI</text>
  <text x="710" y="326" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">gpt-4o-mini</text>
  <text x="710" y="342" text-anchor="middle" fill="#404040" font-family="monospace" font-size="10">inference</text>

  <!-- arrow worker → OpenAI -->
  <line x1="528" y1="290" x2="618" y2="305" stroke="#2e2e2e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="614,300 624,303 618,312" fill="#2e2e2e"/>

  <!-- ── Analytics Engine ── -->
  <rect x="620" y="420" width="180" height="70" rx="10" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <!-- mini bar chart icon -->
  <rect x="648" y="444" width="8" height="18" rx="1" fill="#3a3a3a"/>
  <rect x="660" y="438" width="8" height="24" rx="1" fill="#3a3a3a"/>
  <rect x="672" y="450" width="8" height="12" rx="1" fill="#3a3a3a"/>
  <text x="710" y="460" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Analytics Engine</text>
  <text x="710" y="478" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">telemetry · metrics</text>

  <!-- arrow worker → Analytics (async) -->
  <line x1="528" y1="350" x2="618" y2="445" stroke="#2e2e2e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="613,441 623,443 617,452" fill="#2e2e2e"/>
  <text x="556" y="414" text-anchor="middle" fill="#3a3a3a" font-family="monospace" font-size="9">async</text>

  <!-- ── GitHub OAuth ── -->
  <rect x="890" y="240" width="180" height="70" rx="10" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <text x="980" y="268" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">GitHub OAuth</text>
  <text x="980" y="286" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">identity provider</text>
  <text x="980" y="302" text-anchor="middle" fill="#404040" font-family="monospace" font-size="10">immutable user IDs</text>

  <!-- arrow worker ↔ GitHub OAuth -->
  <line x1="800" y1="270" x2="888" y2="270" stroke="#2e2e2e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="888,265 898,270 888,275" fill="#2e2e2e"/>

  <!-- Terraform label bottom -->
  <rect x="440" y="520" width="320" height="36" rx="8" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
  <text x="600" y="534" text-anchor="middle" fill="#505050" font-family="monospace" font-size="10">Infrastructure as Code</text>
  <text x="600" y="549" text-anchor="middle" fill="#404040" font-family="monospace" font-size="10">Terraform · GitHub Actions · remote state</text>

  <!-- bottom subtle line -->
  <line x1="80" y1="590" x2="1120" y2="590" stroke="#1f1f1f" stroke-width="1"/>
  <text x="600" y="612" text-anchor="middle" fill="#383838" font-family="monospace" font-size="10">Cloudflare Workers · Q&amp;A Service</text>
</svg>
